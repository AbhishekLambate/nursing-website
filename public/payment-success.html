<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful – NursingCNE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a7f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 56px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 80px rgba(0, 0, 0, .3);
            animation: pop 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pop {
            from {
                transform: scale(0.92);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            background: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: bounce 0.6s 0.3s ease both;
        }

        @keyframes bounce {
            0% {
                transform: scale(0);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            color: #10b981;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            color: #475569;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .txn-id {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 20px;
            margin: 20px 0 32px;
            font-size: 14px;
            color: #64748b;
        }

        .txn-id strong {
            display: block;
            color: #0f172a;
            font-size: 16px;
            margin-top: 4px;
            font-family: monospace;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #1e4fc5, #06b6d4);
            color: white;
            padding: 14px 36px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(30, 79, 197, .35);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(30, 79, 197, .45);
        }

        .check-circle {
            color: #10b981;
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Payment Successful! 🎉</h1>
        <p>Your registration is confirmed. A confirmation email has been sent to your inbox.</p>
        <div class="txn-id">
            Transaction ID
            <strong id="txnIdDisplay">—</strong>
        </div>
        <a href="/" class="btn">← Back to Homepage</a>
    </div>
    <script>
        const params = new URLSearchParams(location.search);
        const txnId = params.get('txnId') || params.get('transactionId');
        if (txnId) document.getElementById('txnIdDisplay').textContent = txnId;

        // Verify payment status
        if (txnId) {
            fetch(`/api/payment/status/${txnId}`)
                .catch(err => console.log('Status check skipped:', err.message));
        }
    </script>
</body>

</html>
